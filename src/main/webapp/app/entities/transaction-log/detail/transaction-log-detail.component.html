<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (transactionLog()) {
      <div>
        <h2 data-cy="transactionLogDetailsHeading">
          <span jhiTranslate="jhipsterFinancialManagementApp.transactionLog.detail.title">Transaction Log</span>
        </h2>

        <hr />

        <jhi-alert-error></jhi-alert-error>

        <jhi-alert></jhi-alert>

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ transactionLog()!.id }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterFinancialManagementApp.transactionLog.action">Action</span></dt>
          <dd>
            <span>{{ transactionLog()!.action }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterFinancialManagementApp.transactionLog.actionAt">Action At</span></dt>
          <dd>
            <span>{{ transactionLog()!.actionAt | formatMediumDatetime }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterFinancialManagementApp.transactionLog.transaction">Transaction</span></dt>
          <dd>
            @if (transactionLog()!.transaction) {
              <div>
                <a [routerLink]="['/transaction', transactionLog()!.transaction?.id, 'view']">{{ transactionLog()!.transaction?.id }}</a>
              </div>
            }
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
        </button>

        <button type="button" [routerLink]="['/transaction-log', transactionLog()!.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
        </button>
      </div>
    }
  </div>
</div>
